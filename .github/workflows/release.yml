name: Release

on:
  push:
    tags:
      - 'v*'

# No tarball artifact — Antu is distributed exclusively via
# `npx skills add itsmistermoon/cortex-forge` (skills.sh). This workflow only
# creates the GitHub Release object on tag push so release notes have
# somewhere to live; notes are always hand-written afterward via `gh release
# edit`, never the auto-generated ones.
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
