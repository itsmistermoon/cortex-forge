name: skill sync

on:
  push:
    paths:
      - "skills/**/SKILL.md"
      - "skills/**/references/**"
      - "skills/**/scripts/**"
      - "references/**"
      - "AGENTS.md"
      - "scripts/check-skill-sync.sh"
      - "skills.sh.json"
      - ".claude-plugin/plugin.json"
      - ".github/workflows/skill-sync.yml"
  pull_request:
    paths:
      - "skills/**/SKILL.md"
      - "skills/**/references/**"
      - "skills/**/scripts/**"
      - "references/**"
      - "AGENTS.md"
      - "scripts/check-skill-sync.sh"
      - "skills.sh.json"
      - ".claude-plugin/plugin.json"
      - ".github/workflows/skill-sync.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Check skill consistency
        run: bash scripts/check-skill-sync.sh
