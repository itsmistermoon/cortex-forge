name: skill sync

on:
  push:
    paths:
      - "skills/**/SKILL.md"
      - "AGENTS.md"
      - "scripts/check-skill-sync.sh"
  pull_request:
    paths:
      - "skills/**/SKILL.md"
      - "AGENTS.md"
      - "scripts/check-skill-sync.sh"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Check skill consistency
        run: bash scripts/check-skill-sync.sh
